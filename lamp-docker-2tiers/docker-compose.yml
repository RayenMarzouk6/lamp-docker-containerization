version: "1"
services:
  db:
    image: mysql
    container_name: lamp_db
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: admin
      MYSQL_DATABASE: lamp_test
      MYSQL_USER: lamp_user
      MYSQL_PASSWORD: Lamp@2026#Secure
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - lamp_network
    healthcheck:
      test: ["CMD" , "mysqladmin" , "ping" , "-h" , "localhost" , "-u" , "lamp_user" , "--password=Lamp@2026#Secure"]

  web:
    build: .
    container_name: lamp_web
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www/html
    networks:
      - lamp_network
    depends_on:
      db:
        condition: service_healthy


networks:
  lamp_network:
    driver: bridge


volumes:
  mysql_data:

