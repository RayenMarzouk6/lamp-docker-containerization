version: "2"
services:
  db:
    image: mysql:8.0
    container_name: lamp_db
    ports:
      - "3306:3306"
    environment:
      MYSQL_USER: lamp_user
      MYSQL_DATABASE: lamp_test
      MYSQL_ROOT_PASSWORD: admin
      MYSQL_PASSWORD: Lamp@2026#Secure
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - lamp_app_network
    healthcheck:
      test: ["CMD", "mysqladmin" , "ping" , "-h" , "localhost" , "-u" , "lamp_user" , "--password=Lamp@2026#Secure"]


  app:
    image: php:8.2-fpm
    container_name: lamp_app_php
    ports:
      - "9000:80"
    networks:
      - lamp_app_network
    healthcheck:
      test: ["CMD" , ]
    depends_on:
      db:
        condition: service_healthy

  web:
    image: httpd
    container_name: lamp_web
    ports:
      - "80:80"
    networks:
      - lamp_app_network
    depends_on:
      app:
        condition: service_healthy
networks:
  lamp_app_network:
    driver: bridge
volumes:
  mysql_data:
